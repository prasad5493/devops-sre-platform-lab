AWSTemplateFormatVersion: '2010-09-09'
Description: DevOps SRE Platform Lab - VPC, EC2 Linux web server, IAM role, and CloudWatch alarm.

Parameters:
  EnvironmentName:
    Type: String
    Default: devops-sre-lab
    Description: Name prefix for created resources.

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
    Description: EC2 instance type. Use small test instances for learning.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI from AWS Systems Manager Parameter Store.

  AllowedHttpCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR range allowed to access HTTP port 80.

  AllowedSshCidr:
    Type: String
    Default: 127.0.0.1/32
    Description: CIDR range allowed to access SSH. Default blocks public SSH access.

  EnableSSH:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to true only if you need SSH access.

Conditions:
  CreateSshRule: !Equals [!Ref EnableSSH, 'true']

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.20.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-igw'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: 10.20.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-a'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-rt'

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and optional SSH access.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedHttpCidr
        - !If
          - CreateSshRule
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: !Ref AllowedSshCidr
          - !Ref AWS::NoValue
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-web-sg'

  WebInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-web-instance-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-web-instance-role'

  WebInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WebInstanceRole

  WebInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref WebInstanceProfile
      SubnetId: !Ref PublicSubnetA
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-web-server'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y nginx
          systemctl enable nginx
          cat > /usr/share/nginx/html/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>DevOps SRE Platform Lab</title>
            <style>
              body { font-family: Arial, sans-serif; padding: 40px; background: #f6f8fb; color: #1f2937; }
              main { max-width: 760px; margin: auto; background: white; padding: 32px; border-radius: 12px; }
              .ok { color: #047857; font-weight: bold; }
            </style>
          </head>
          <body>
            <main>
              <h1>DevOps SRE Platform Lab</h1>
              <p class="ok">Nginx is running on an AWS EC2 Linux server.</p>
              <p>This server was created using AWS CloudFormation.</p>
            </main>
          </body>
          </html>
          HTML
          echo 'healthy' > /usr/share/nginx/html/health
          systemctl start nginx

  Ec2StatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm if EC2 instance fails AWS status checks.
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed
      Dimensions:
        - Name: InstanceId
          Value: !Ref WebInstance
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  WebsiteUrl:
    Description: Public URL for the EC2 web server.
    Value: !Sub 'http://${WebInstance.PublicDnsName}'

  HealthCheckUrl:
    Description: Health check endpoint.
    Value: !Sub 'http://${WebInstance.PublicDnsName}/health'

  InstanceId:
    Description: EC2 instance ID.
    Value: !Ref WebInstance

  PublicIp:
    Description: EC2 public IP address.
    Value: !GetAtt WebInstance.PublicIp
